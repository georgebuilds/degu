name: Release

on:
  workflow_dispatch:
    inputs:
      major:
        description: Major version
        type: number
        default: 0
      minor:
        description: Minor version
        type: number
        default: 1
      patch:
        description: Patch version
        type: number
        default: 0
      notes:
        description: Release notes body (optional; default uses platform-aware template)
        type: string
        default: ""
      build_mac:
        description: Build macOS arm64
        type: boolean
        default: true
      build_linux:
        description: Build Linux x64
        type: boolean
        default: true
      build_windows:
        description: Build Windows x64
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute and validate tag
        id: tag
        run: |
          TAG="v${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG" >&2
            exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1 || gh release view "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi
          if [[ "${{ inputs.build_mac }}" != "true" && "${{ inputs.build_linux }}" != "true" && "${{ inputs.build_windows }}" != "true" ]]; then
            echo "At least one platform must be selected" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build_mac:
    needs: prepare
    if: ${{ inputs.build_mac }}
    runs-on: macos-14 # Apple Silicon — same arch as the artifact.
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      # ====================================================================
      # macOS Developer ID signing + Apple notarization
      # ====================================================================
      # Sign degu.app and degu-cli-* with a Developer ID Application
      # certificate, then submit to Apple's notary service. Mirrors the
      # gated Windows signing pattern in build_windows: when the seven
      # APPLE_* / KEYCHAIN_PASSWORD secrets aren't all set, every sign /
      # notarize step skips with a warning and the bundle ships ad-hoc
      # signed (Gatekeeper then requires a one-time right-click → Open).
      #
      # Required repo secrets:
      #   APPLE_CERTIFICATE            - base64-encoded Developer ID .p12
      #   APPLE_CERTIFICATE_PASSWORD   - password for the .p12
      #   APPLE_SIGNING_IDENTITY       - e.g. "Developer ID Application: …"
      #   APPLE_ID                     - Apple ID used for notarytool
      #   APPLE_PASSWORD               - app-specific password for that ID
      #   APPLE_TEAM_ID                - 10-char team identifier
      #   KEYCHAIN_PASSWORD            - any password for the ephemeral keychain
      - name: Detect Apple signing config
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" \
             && -n "$APPLE_SIGNING_IDENTITY" && -n "$APPLE_ID" \
             && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" \
             && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Apple Developer ID signing + notarization configured."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets not all set; macOS bundle will be ad-hoc signed and NOT notarized."
          fi

      # Wails compiles from source on `go install` (~30–60 s on a fresh
      # runner). Cache the compiled binary keyed on the pinned version so
      # subsequent runs skip the install entirely; a version bump below
      # automatically misses the cache and recompiles.
      - name: Cache Wails CLI
        id: wails-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin/wails
          key: wails-${{ runner.os }}-${{ runner.arch }}-v2.12.0

      - name: Install Wails
        if: steps.wails-cache.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: npm ci

      - name: Sync wails.json productVersion
        run: |
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json

      - name: Build degu.app (macOS arm64)
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform darwin/arm64 -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Import signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          # Prepend our keychain to the user search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | xargs)

      - name: Sign degu.app
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Sign inside-out: inner Mach-O first, then the bundle. Apple
          # has deprecated `--deep` (and `--deep --verify`) because it
          # walks the whole bundle tree at sign time even when there's
          # nothing nested to sign — noticeably slower, and a no-op for
          # a Wails app whose only Mach-O lives at Contents/MacOS/degu.
          # Two explicit signatures are both faster and the pattern
          # Apple recommends in TN3161 / the codesign(1) man page.
          /usr/bin/codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            build/bin/degu.app/Contents/MacOS/degu
          /usr/bin/codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            build/bin/degu.app
          /usr/bin/codesign --verify --strict --verbose=2 build/bin/degu.app

      - name: Verify the bundle
        run: |
          test -d build/bin/degu.app
          test -x build/bin/degu.app/Contents/MacOS/degu
          file build/bin/degu.app/Contents/MacOS/degu
          /usr/bin/codesign -dv --verbose=4 build/bin/degu.app 2>&1 | head -30

      - name: Build degu-cli
        run: |
          mkdir -p release
          node scripts/build-embed.mjs
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "release/degu-cli-${TAG}-darwin-arm64" \
            ./cmd/degu

      - name: Sign degu-cli
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          /usr/bin/codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "release/degu-cli-${TAG}-darwin-arm64"
          /usr/bin/codesign --verify --strict --verbose=2 \
            "release/degu-cli-${TAG}-darwin-arm64"

      # Notarization is the dominant wall-clock cost of this job: each
      # `notarytool submit --wait` blocks for 2–8 min (sometimes longer)
      # while Apple ingests, scans, and issues a ticket. Run both
      # submissions as background jobs so the two waits overlap — Apple
      # processes them in parallel server-side, collapsing total wall
      # time to roughly the slower of the two instead of summing them.
      #
      # We deliberately do this in one step rather than splitting the
      # job in two: a second `runs-on: macos-14` job would re-run
      # checkout, setup-go, setup-node, npm ci, and the keychain import
      # (~60–90 s of duplicated setup). One step keeps the gain pure.
      - name: Notarize app and CLI in parallel
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Zip both artifacts for upload. `ditto --keepParent` keeps
          # the .app directory inside the archive (notarytool requires
          # the bundle wrapper, not its loose contents). `--sequesterRsrc`
          # preserves macOS extended attributes / signatures across the
          # archive boundary in a way `zip -r` doesn't.
          ditto -c -k --keepParent --sequesterRsrc \
            build/bin/degu.app "$RUNNER_TEMP/degu-notarize.zip"
          ditto -c -k "release/degu-cli-${TAG}-darwin-arm64" \
            "$RUNNER_TEMP/degu-cli-notarize.zip"

          # Launch both submissions as background jobs. We keep `--wait`
          # on each — it's the only way notarytool returns a non-zero
          # exit code on rejection (without it, the submit returns 0
          # the moment the upload completes, regardless of outcome).
          # Output is redirected to per-submission log files so we can
          # print them after both jobs finish, in a deterministic order.
          xcrun notarytool submit "$RUNNER_TEMP/degu-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait > "$RUNNER_TEMP/notarize-app.log" 2>&1 &
          APP_PID=$!

          xcrun notarytool submit "$RUNNER_TEMP/degu-cli-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait > "$RUNNER_TEMP/notarize-cli.log" 2>&1 &
          CLI_PID=$!

          # `wait <pid>` blocks until that specific PID exits and
          # returns its exit status; bare `wait` would only surface the
          # last job's status. We disable `errexit` around the waits so
          # a failure in the first one doesn't short-circuit before we
          # collect the second status and dump both logs — otherwise
          # half the failure context would be lost.
          set +e
          wait "$APP_PID"; APP_STATUS=$?
          wait "$CLI_PID"; CLI_STATUS=$?
          set -e

          echo "=== degu.app notarization log ==="
          cat "$RUNNER_TEMP/notarize-app.log"
          echo "=== degu-cli notarization log ==="
          cat "$RUNNER_TEMP/notarize-cli.log"

          if [ "$APP_STATUS" -ne 0 ] || [ "$CLI_STATUS" -ne 0 ]; then
            echo "Notarization failed (app=$APP_STATUS cli=$CLI_STATUS)" >&2
            exit 1
          fi

          # Staple the .app so Gatekeeper can verify offline. Raw mach-o
          # binaries (the CLI) can't be stapled — Gatekeeper queries
          # Apple online on first launch using the ticket stored during
          # notarization.
          xcrun stapler staple build/bin/degu.app
          xcrun stapler validate build/bin/degu.app

      # Order matters: zip + hash AFTER signing/notarization, never before.
      # The published .sha256 must cover the signed+stapled bytes; otherwise
      # users who verify the hash and re-extract get a mismatch. Same lesson
      # as the parallel Windows path documents inline.
      - name: Stage degu.app archive
        run: |
          mkdir -p release
          # `ditto` preserves macOS extended attributes / signatures across
          # the archive boundary in a way `zip -r` doesn't — critical for
          # the stapled notarization ticket to survive download-and-unzip
          # on the user's machine.
          ditto -c -k --keepParent --sequesterRsrc \
            build/bin/degu.app \
            "release/degu-${TAG}-darwin-arm64.zip"
          (cd release && shasum -a 256 "degu-${TAG}-darwin-arm64.zip" \
            > "degu-${TAG}-darwin-arm64.zip.sha256")

      - name: Hash degu-cli
        run: |
          (cd release && shasum -a 256 "degu-cli-${TAG}-darwin-arm64" \
            > "degu-cli-${TAG}-darwin-arm64.sha256")
          ls -la release

      - uses: actions/upload-artifact@v6
        with:
          name: mac
          path: release/

  build_linux:
    needs: prepare
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Wails system deps (Linux)
        # Wails on linux needs gtk3 + webkit2gtk; ubuntu-22.04 ships
        # libwebkit2gtk-4.0-dev (24.04 renamed to -4.1).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: npm ci

      - name: Sync wails.json productVersion
        run: |
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json

      - name: Build degu (linux/amd64)
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform linux/amd64 -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Verify the binary
        run: |
          test -x build/bin/degu
          file build/bin/degu

      - name: Stage release artifacts
        run: |
          mkdir -p release
          tar -C build/bin -czf \
            "release/degu-${TAG}-linux-amd64.tar.gz" degu
          (cd release && sha256sum "degu-${TAG}-linux-amd64.tar.gz" \
            > "degu-${TAG}-linux-amd64.tar.gz.sha256")

          node scripts/build-embed.mjs
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "release/degu-cli-${TAG}-linux-amd64" \
            ./cmd/degu
          (cd release && sha256sum "degu-cli-${TAG}-linux-amd64" \
            > "degu-cli-${TAG}-linux-amd64.sha256")

          ls -la release

      - uses: actions/upload-artifact@v6
        with:
          name: linux
          path: release/

  build_windows:
    needs: prepare
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        # Use Git Bash so the script reads identically to the unix jobs.
        # Wails CLI works in either shell on Windows.
        shell: bash
    steps:
      # Windows Defender real-time scans every file written to disk, which
      # taxes Go's build cache (`$LOCALAPPDATA\go-build`), the module cache
      # under `$USERPROFILE\go\pkg\mod`, npm's tens-of-thousands-of-files
      # `node_modules` writes, and Wails' CGO + resource-compiler temp
      # output. Excluding those paths before anything else runs cuts the
      # job's wall time meaningfully on the hosted windows-2022 runner.
      # The GH-hosted runner's default user is in Administrators, so
      # `Add-MpPreference` works without explicit elevation.
      - name: Exclude build paths from Windows Defender
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\go"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\go-build"
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      # ====================================================================
      # Windows Authenticode signing — Azure Trusted Signing
      # ====================================================================
      # Sign degu.exe (Wails GUI) and degu-cli-*.exe (headless) if the five
      # AZURE_* secrets are configured. Without them every sign/verify step
      # below skips with a warning and the binaries ship unsigned, so this
      # workflow stays runnable in forks and before signing is provisioned.
      #
      # Required setup on the Azure side (do this once, then forget):
      #   1. Trusted Signing Account — any region; we hard-code the East US
      #      endpoint below to match the account.
      #   2. Certificate Profile — Public Trust, tied to a verified
      #      Microsoft Partner Center publisher identity.
      #   3. App Registration / Service Principal — generate a client secret.
      #   4. RBAC: assign role `Trusted Signing Certificate Profile Signer`
      #      to the SP, scoped to the account (or the specific profile).
      #      Without this assignment the sign call returns HTTP 403 even
      #      though authentication itself succeeds.
      #   5. Add five repo secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID,
      #      AZURE_CLIENT_SECRET, AZURE_SIGNING_ACCOUNT (account name, not
      #      ARM ID), AZURE_CERTIFICATE_PROFILE (profile name).
      #
      # Per-step gotchas are noted inline below.
      - name: Detect Azure signing config
        id: signing
        env:
          AZ_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZ_PROFILE: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
        run: |
          if [[ -n "$AZ_TENANT" && -n "$AZ_CLIENT" && -n "$AZ_ACCOUNT" && -n "$AZ_PROFILE" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Azure Trusted Signing configured."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure Trusted Signing secrets not set; Windows binaries will be UNSIGNED."
          fi

      - name: Pre-build cleanup
        # Wipe stale prior-version artifacts so the signer can't pick them
        # up if the runner is reused with a cached workspace.
        run: rm -rf build/bin

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: npm ci

      - name: Sync wails.json productVersion
        run: |
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json

      - name: Build degu.exe (windows/amd64)
        run: |
          export PATH="$USERPROFILE/go/bin:$PATH"
          wails build -platform windows/amd64 -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Verify the binary
        run: |
          test -f build/bin/degu.exe
          file build/bin/degu.exe

      - name: Sign degu.exe (Azure Trusted Signing)
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          # Path validator in the action rejects non-rooted paths; anchor on
          # github.workspace. files-folder + filter is preferred over `files`
          # so build/bin can grow new artifacts without editing the workflow.
          files-folder: ${{ github.workspace }}/build/bin
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          # Use Microsoft's RFC-3161 TSA bundled with Trusted Signing —
          # other public TSAs (DigiCert, Sectigo, etc.) reject Trusted
          # Signing's short-lived leaf certificates.
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          # GOTCHA: do NOT add other `exclude-*-credential: true` flags.
          # The action passes our SP secrets to signtool by setting the
          # AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET env
          # vars, which `EnvironmentCredential` reads. Excluding it forces
          # DefaultAzureCredential to fall through to AzureDeveloperCli /
          # interactive flows, which fail on the runner with
          # "Azure Developer CLI could not be found." Only the interactive
          # browser credential is meaningful to disable for CI.
          exclude-interactive-browser-credential: true

      # Verify the signature we just applied. The signtool exit code alone
      # is not trustworthy — Andora's parallel macOS path caught silent
      # fall-back-to-ad-hoc-signing this way; same lesson applies here.
      # `Status: Valid` requires a verifiable cert chain AND an embedded
      # RFC-3161 timestamp from a trusted TSA.
      - name: Verify degu.exe signature
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature build/bin/degu.exe
          $sig | Format-List
          if ($sig.Status -ne 'Valid') {
            Write-Error "degu.exe signature status is $($sig.Status), expected Valid"
            exit 1
          }

      # Order matters: zip + hash AFTER the sign step, never before. The
      # published .sha256 must cover the signed bytes; otherwise users who
      # verify the hash and re-extract get a hash mismatch on re-zip.
      - name: Stage Wails GUI archive
        run: |
          mkdir -p release
          # 7z is preinstalled on the windows-2022 runner.
          (cd build/bin && 7z a "../../release/degu-${TAG}-windows-amd64.zip" degu.exe)
          (cd release && sha256sum "degu-${TAG}-windows-amd64.zip" \
            > "degu-${TAG}-windows-amd64.zip.sha256")

      - name: Build degu-cli
        run: |
          node scripts/build-embed.mjs
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "release/degu-cli-${TAG}-windows-amd64.exe" \
            ./cmd/degu

      # Same gotchas as the degu.exe sign step above — see inline notes there.
      # The release/ folder also contains the .zip and .sha256 from the
      # previous step; the `exe` filter ignores those and only signs the
      # newly built CLI binary.
      - name: Sign degu-cli (Azure Trusted Signing)
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}/release
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-interactive-browser-credential: true

      - name: Verify degu-cli signature
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "release/degu-cli-$env:TAG-windows-amd64.exe"
          $sig | Format-List
          if ($sig.Status -ne 'Valid') {
            Write-Error "degu-cli signature status is $($sig.Status), expected Valid"
            exit 1
          }

      - name: Hash degu-cli
        run: |
          (cd release && sha256sum "degu-cli-${TAG}-windows-amd64.exe" \
            > "degu-cli-${TAG}-windows-amd64.exe.sha256")
          ls -la release

      - uses: actions/upload-artifact@v6
        with:
          name: windows
          path: release/

  release:
    needs: [prepare, build_mac, build_linux, build_windows]
    # Run the release as long as prepare succeeded and at least one build succeeded.
    # `always()` keeps us alive past skipped jobs (when their checkbox was off).
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build_mac.result == 'success' ||
       needs.build_linux.result == 'success' ||
       needs.build_windows.result == 'success')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
      MAC_RESULT: ${{ needs.build_mac.result }}
      LINUX_RESULT: ${{ needs.build_linux.result }}
      WINDOWS_RESULT: ${{ needs.build_windows.result }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Inspect artifacts
        run: find artifacts -type f | sort

      - name: Create release
        env:
          NOTES: ${{ inputs.notes }}
        run: |
          # Build a default body that mentions only the platforms that succeeded.
          BODY="# degu ${TAG}"$'\n\n'
          BODY+="degu travels with your media. Drop the binary into the folder you want to browse, double-click, and it serves that folder — tags and SQLite DB live next to the binary."$'\n\n'
          if [[ "$MAC_RESULT" == "success" ]]; then
            BODY+="## macOS (Apple Silicon)"$'\n\n'
            BODY+="1. Download \`degu-${TAG}-darwin-arm64.zip\` and unzip it."$'\n'
            BODY+="2. Drop \`degu.app\` into your media folder and double-click. degu strictly serves the folder it lives in — putting it in /Applications means degu will try to serve /Applications, which is almost never what you want."$'\n'
            BODY+="3. Signed with a Developer ID certificate and notarized by Apple — Gatekeeper opens it directly, no right-click workaround needed."$'\n\n'
          fi
          if [[ "$LINUX_RESULT" == "success" ]]; then
            BODY+="## Linux (x86_64)"$'\n\n'
            BODY+="1. Download \`degu-${TAG}-linux-amd64.tar.gz\` and \`tar -xzf\` it into your media folder."$'\n'
            BODY+="2. \`chmod +x degu && ./degu\` — serves the folder it lives in."$'\n'
            BODY+="   Requires \`libgtk-3\` and \`libwebkit2gtk-4.0\` (most distros ship these by default)."$'\n'
            BODY+="   Ubuntu 24.04 / Debian 13 ship \`libwebkit2gtk-4.1\` instead; install a 4.0 back-version package or run from a 22.04-based environment."$'\n\n'
          fi
          if [[ "$WINDOWS_RESULT" == "success" ]]; then
            BODY+="## Windows (x64)"$'\n\n'
            BODY+="1. Download \`degu-${TAG}-windows-amd64.zip\` and unzip it into your media folder."$'\n'
            BODY+="2. Double-click \`degu.exe\` — serves the folder it lives in. Requires WebView2 (preinstalled on Windows 11; Edge installs it on 10)."$'\n\n'
          fi
          BODY+="## Headless CLI"$'\n\n'
          BODY+="\`degu-cli-*\` is the no-window flavour for SSH / serve-and-open-in-any-browser use. Drop it next to your media or pass an explicit path:"$'\n'
          BODY+="\`\`\`"$'\n'
          BODY+="chmod +x degu-cli-${TAG}-<platform>"$'\n'
          BODY+="./degu-cli-${TAG}-<platform>             # serves the folder it's in"$'\n'
          BODY+="./degu-cli-${TAG}-<platform> /some/path  # or specify"$'\n'
          BODY+="\`\`\`"$'\n'

          FINAL="${NOTES:-$BODY}"
          gh release create "$TAG" --title "$TAG" --notes "$FINAL"

          # Each build job uploads its release/ directory as an artifact named
          # after the platform; download-artifact lays them out as
          # artifacts/<platform>/<files>. Glob each platform separately so a
          # missing one is just a no-op.
          for plat in mac linux windows; do
            if compgen -G "artifacts/${plat}/*" > /dev/null; then
              gh release upload "$TAG" artifacts/${plat}/* --clobber
            fi
          done
