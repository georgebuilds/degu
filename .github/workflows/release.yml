name: Release

on:
  workflow_dispatch:
    inputs:
      major:
        description: Major version
        type: number
        default: 0
      minor:
        description: Minor version
        type: number
        default: 1
      patch:
        description: Patch version
        type: number
        default: 0
      notes:
        description: Release notes body (optional; default uses platform-aware template)
        type: string
        default: ""
      build_mac:
        description: Build macOS arm64
        type: boolean
        default: true
      build_linux:
        description: Build Linux x64
        type: boolean
        default: true
      build_windows:
        description: Build Windows x64
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute and validate tag
        id: tag
        run: |
          TAG="v${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG" >&2
            exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1 || gh release view "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi
          if [[ "${{ inputs.build_mac }}" != "true" && "${{ inputs.build_linux }}" != "true" && "${{ inputs.build_windows }}" != "true" ]]; then
            echo "At least one platform must be selected" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build_mac:
    needs: prepare
    if: ${{ inputs.build_mac }}
    runs-on: macos-14 # Apple Silicon — same arch as the artifact.
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: npm ci

      - name: Sync wails.json productVersion
        run: |
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json

      - name: Build degu.app (macOS arm64)
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform darwin/arm64 -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Verify the bundle
        run: |
          test -d build/bin/degu.app
          test -x build/bin/degu.app/Contents/MacOS/degu
          file build/bin/degu.app/Contents/MacOS/degu
          /usr/bin/codesign -dv build/bin/degu.app 2>&1 || true

      - name: Stage release artifacts
        run: |
          mkdir -p release
          # `ditto` preserves macOS extended attributes / signatures across
          # the archive boundary in a way `zip -r` doesn't.
          ditto -c -k --keepParent --sequesterRsrc \
            build/bin/degu.app \
            "release/degu-${TAG}-darwin-arm64.zip"
          (cd release && shasum -a 256 "degu-${TAG}-darwin-arm64.zip" \
            > "degu-${TAG}-darwin-arm64.zip.sha256")

          node scripts/build-embed.mjs
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "release/degu-cli-${TAG}-darwin-arm64" \
            ./cmd/degu
          (cd release && shasum -a 256 "degu-cli-${TAG}-darwin-arm64" \
            > "degu-cli-${TAG}-darwin-arm64.sha256")

          ls -la release

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/

  build_linux:
    needs: prepare
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Wails system deps (Linux)
        # Wails on linux needs gtk3 + webkit2gtk; ubuntu-22.04 ships
        # libwebkit2gtk-4.0-dev (24.04 renamed to -4.1).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: npm ci

      - name: Sync wails.json productVersion
        run: |
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json

      - name: Build degu (linux/amd64)
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform linux/amd64 -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Verify the binary
        run: |
          test -x build/bin/degu
          file build/bin/degu

      - name: Stage release artifacts
        run: |
          mkdir -p release
          tar -C build/bin -czf \
            "release/degu-${TAG}-linux-amd64.tar.gz" degu
          (cd release && sha256sum "degu-${TAG}-linux-amd64.tar.gz" \
            > "degu-${TAG}-linux-amd64.tar.gz.sha256")

          node scripts/build-embed.mjs
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "release/degu-cli-${TAG}-linux-amd64" \
            ./cmd/degu
          (cd release && sha256sum "degu-cli-${TAG}-linux-amd64" \
            > "degu-cli-${TAG}-linux-amd64.sha256")

          ls -la release

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/

  build_windows:
    needs: prepare
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        # Use Git Bash so the script reads identically to the unix jobs.
        # Wails CLI works in either shell on Windows.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Sign the Authenticode of `degu.exe` and `degu-cli-*.exe` via Azure
      # Trusted Signing if the five AZURE_* secrets are configured. If they
      # aren't, signing steps are skipped and the binaries ship unsigned —
      # this keeps the workflow runnable in forks / before signing is set up.
      - name: Detect Azure signing config
        id: signing
        env:
          AZ_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZ_PROFILE: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
        run: |
          if [[ -n "$AZ_TENANT" && -n "$AZ_CLIENT" && -n "$AZ_ACCOUNT" && -n "$AZ_PROFILE" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Azure Trusted Signing configured."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure Trusted Signing secrets not set; Windows binaries will be UNSIGNED."
          fi

      - name: Pre-build cleanup
        # Wipe stale prior-version artifacts so the signer can't pick them
        # up if the runner is reused with a cached workspace.
        run: rm -rf build/bin

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: npm ci

      - name: Sync wails.json productVersion
        run: |
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json

      - name: Build degu.exe (windows/amd64)
        run: |
          export PATH="$USERPROFILE/go/bin:$PATH"
          wails build -platform windows/amd64 -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Verify the binary
        run: |
          test -f build/bin/degu.exe
          file build/bin/degu.exe

      - name: Sign degu.exe (Azure Trusted Signing)
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}/build/bin
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: true
          exclude-azure-powershell-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify degu.exe signature
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature build/bin/degu.exe
          $sig | Format-List
          if ($sig.Status -ne 'Valid') {
            Write-Error "degu.exe signature status is $($sig.Status), expected Valid"
            exit 1
          }

      - name: Stage Wails GUI archive
        run: |
          mkdir -p release
          # 7z is preinstalled on the windows-2022 runner. The zip captures
          # the (now-signed) degu.exe; its sha256 is computed after signing.
          (cd build/bin && 7z a "../../release/degu-${TAG}-windows-amd64.zip" degu.exe)
          (cd release && sha256sum "degu-${TAG}-windows-amd64.zip" \
            > "degu-${TAG}-windows-amd64.zip.sha256")

      - name: Build degu-cli
        run: |
          node scripts/build-embed.mjs
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "release/degu-cli-${TAG}-windows-amd64.exe" \
            ./cmd/degu

      - name: Sign degu-cli (Azure Trusted Signing)
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}/release
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: true
          exclude-azure-powershell-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify degu-cli signature
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "release/degu-cli-$env:TAG-windows-amd64.exe"
          $sig | Format-List
          if ($sig.Status -ne 'Valid') {
            Write-Error "degu-cli signature status is $($sig.Status), expected Valid"
            exit 1
          }

      - name: Hash degu-cli
        run: |
          (cd release && sha256sum "degu-cli-${TAG}-windows-amd64.exe" \
            > "degu-cli-${TAG}-windows-amd64.exe.sha256")
          ls -la release

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/

  release:
    needs: [prepare, build_mac, build_linux, build_windows]
    # Run the release as long as prepare succeeded and at least one build succeeded.
    # `always()` keeps us alive past skipped jobs (when their checkbox was off).
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build_mac.result == 'success' ||
       needs.build_linux.result == 'success' ||
       needs.build_windows.result == 'success')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
      MAC_RESULT: ${{ needs.build_mac.result }}
      LINUX_RESULT: ${{ needs.build_linux.result }}
      WINDOWS_RESULT: ${{ needs.build_windows.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Inspect artifacts
        run: find artifacts -type f | sort

      - name: Create release
        env:
          NOTES: ${{ inputs.notes }}
        run: |
          # Build a default body that mentions only the platforms that succeeded.
          BODY="# degu ${TAG}"$'\n\n'
          BODY+="degu travels with your media. Drop the binary into the folder you want to browse, double-click, and it serves that folder — tags and SQLite DB live next to the binary."$'\n\n'
          if [[ "$MAC_RESULT" == "success" ]]; then
            BODY+="## macOS (Apple Silicon)"$'\n\n'
            BODY+="1. Download \`degu-${TAG}-darwin-arm64.zip\` and unzip it."$'\n'
            BODY+="2. Drop \`degu.app\` into your media folder and double-click. (Or move it to /Applications for a global install — that flavour defaults to ~/Pictures.)"$'\n'
            BODY+="3. First launch: right-click → **Open** (self-signed; Gatekeeper requires the explicit allow once)."$'\n'
            BODY+="   Alternatively: \`xattr -dr com.apple.quarantine /path/to/degu.app\`."$'\n\n'
          fi
          if [[ "$LINUX_RESULT" == "success" ]]; then
            BODY+="## Linux (x86_64)"$'\n\n'
            BODY+="1. Download \`degu-${TAG}-linux-amd64.tar.gz\` and \`tar -xzf\` it into your media folder."$'\n'
            BODY+="2. \`chmod +x degu && ./degu\` — serves the folder it lives in."$'\n'
            BODY+="   Requires \`libgtk-3\` and \`libwebkit2gtk-4.0\` (most distros ship these by default)."$'\n'
            BODY+="   Ubuntu 24.04 / Debian 13 ship \`libwebkit2gtk-4.1\` instead; install a 4.0 back-version package or run from a 22.04-based environment."$'\n\n'
          fi
          if [[ "$WINDOWS_RESULT" == "success" ]]; then
            BODY+="## Windows (x64)"$'\n\n'
            BODY+="1. Download \`degu-${TAG}-windows-amd64.zip\` and unzip it into your media folder."$'\n'
            BODY+="2. Double-click \`degu.exe\` — serves the folder it lives in. Requires WebView2 (preinstalled on Windows 11; Edge installs it on 10)."$'\n\n'
          fi
          BODY+="## Headless CLI"$'\n\n'
          BODY+="\`degu-cli-*\` is the no-window flavour for SSH / serve-and-open-in-any-browser use. Drop it next to your media or pass an explicit path:"$'\n'
          BODY+="\`\`\`"$'\n'
          BODY+="chmod +x degu-cli-${TAG}-<platform>"$'\n'
          BODY+="./degu-cli-${TAG}-<platform>             # serves the folder it's in"$'\n'
          BODY+="./degu-cli-${TAG}-<platform> /some/path  # or specify"$'\n'
          BODY+="\`\`\`"$'\n'

          FINAL="${NOTES:-$BODY}"
          gh release create "$TAG" --title "$TAG" --notes "$FINAL"

          # Each build job uploads its release/ directory as an artifact named
          # after the platform; download-artifact lays them out as
          # artifacts/<platform>/<files>. Glob each platform separately so a
          # missing one is just a no-op.
          for plat in mac linux windows; do
            if compgen -G "artifacts/${plat}/*" > /dev/null; then
              gh release upload "$TAG" artifacts/${plat}/* --clobber
            fi
          done
